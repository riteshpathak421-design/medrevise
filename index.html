<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>MedRevise 🌸</title>
  <meta name="description" content="Spaced repetition revision planner for MBBS students" />
  <meta name="theme-color" content="#D4537E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="MedRevise" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --pink: #D4537E;
      --pink-light: #FBEAF0;
      --pink-dark: #993556;
      --pink-border: #F4C0D1;
      --rose: #72243E;
      --green: #1D9E75;
      --green-light: #EAF3DE;
      --amber: #EF9F27;
      --amber-light: #FAEEDA;
      --red: #E24B4A;
      --red-light: #FCEBEB;
      --gray-bg: #FAFAF9;
      --gray-card: #FFFFFF;
      --gray-border: rgba(0,0,0,0.08);
      --gray-text: #6B6B6B;
      --gray-hint: #A0A0A0;
      --text: #1A1A1A;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--gray-bg); color: var(--text); font-family: 'DM Sans', sans-serif; }

    /* Layout */
    .app { display: flex; flex-direction: column; min-height: 100vh; max-width: 480px; margin: 0 auto; }

    /* Header */
    .header {
      background: var(--gray-card);
      padding: calc(var(--safe-top) + 16px) 20px 16px;
      border-bottom: 1px solid var(--gray-border);
      position: sticky; top: 0; z-index: 100;
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .app-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 600; color: var(--text); }
    .app-title span { color: var(--pink); }
    .header-date { font-size: 12px; color: var(--gray-text); }

    /* Stats bar */
    .stats-bar { display: flex; gap: 8px; }
    .stat-pill {
      flex: 1; background: var(--gray-bg); border-radius: 10px;
      padding: 8px 10px; text-align: center;
    }
    .stat-pill .num { font-size: 18px; font-weight: 500; color: var(--text); }
    .stat-pill .lbl { font-size: 10px; color: var(--gray-text); margin-top: 1px; }
    .stat-pill.warn .num { color: var(--amber); }
    .stat-pill.good .num { color: var(--green); }

    /* Notification banner */
    .notif-banner {
      margin: 12px 16px 0; padding: 10px 14px;
      background: var(--pink-light); border: 1px solid var(--pink-border);
      border-radius: 12px; font-size: 13px; color: var(--rose);
      display: none; align-items: center; gap: 8px;
      animation: slideDown 0.3s ease;
    }
    .notif-banner.show { display: flex; }
    @keyframes slideDown { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }

    /* Add form */
    .add-section { padding: 16px; }
    .add-card {
      background: var(--gray-card); border-radius: 16px;
      border: 1px solid var(--gray-border); padding: 16px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .add-title {
      font-size: 11px; font-weight: 500; color: var(--pink);
      text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 12px;
    }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group label { font-size: 10px; font-weight: 500; color: var(--gray-text); text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group select, .form-group input, .form-group textarea {
      background: var(--gray-bg); border: 1px solid var(--gray-border);
      border-radius: 10px; padding: 9px 12px; font-size: 13px;
      color: var(--text); font-family: 'DM Sans', sans-serif; outline: none;
      transition: border-color 0.2s; -webkit-appearance: none;
    }
    .form-group select:focus, .form-group input:focus, .form-group textarea:focus { border-color: var(--pink); }
    .form-group textarea { min-height: 72px; resize: none; }
    .btn-add {
      width: 100%; background: var(--pink); color: white; border: none;
      border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 500;
      font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 4px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-add:active { transform: scale(0.98); background: var(--pink-dark); }

    /* Tabs */
    .tabs-wrap { padding: 0 16px; margin-bottom: 4px; }
    .tabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      flex-shrink: 0; font-size: 12px; font-weight: 500;
      padding: 6px 14px; border-radius: 20px;
      border: 1px solid var(--gray-border); background: var(--gray-card);
      color: var(--gray-text); cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .tab.active { background: var(--pink-light); border-color: var(--pink); color: var(--pink-dark); }
    .tab .badge {
      background: var(--pink); color: white; border-radius: 10px;
      font-size: 10px; padding: 1px 6px; min-width: 18px; text-align: center;
    }
    .tab:not(.active) .badge { background: var(--gray-border); color: var(--gray-text); }

    /* List */
    .list-section { padding: 8px 16px 100px; flex: 1; }
    .list-label { font-size: 11px; font-weight: 500; color: var(--gray-hint); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }

    /* Topic card */
    .topic-card {
      background: var(--gray-card); border-radius: 16px;
      border: 1px solid var(--gray-border); padding: 14px 16px;
      margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.04);
      transition: box-shadow 0.2s;
    }
    .topic-card.overdue { border-left: 3px solid var(--red); }
    .topic-card.due-today { border-left: 3px solid var(--amber); }
    .topic-card.upcoming { border-left: 3px solid var(--green); }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .subject-badge {
      font-size: 10px; font-weight: 500; padding: 3px 10px;
      border-radius: 20px; letter-spacing: 0.3px;
    }
    .card-meta { display: flex; gap: 6px; align-items: center; }
    .status-badge { font-size: 10px; font-weight: 500; padding: 3px 8px; border-radius: 20px; }
    .overdue-badge { background: var(--red-light); color: var(--red); }
    .today-badge { background: var(--amber-light); color: #854F0B; }
    .card-topic { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
    .card-concepts { font-size: 12px; color: var(--gray-text); line-height: 1.55; margin-bottom: 10px; }
    .studied-on { font-size: 11px; color: var(--gray-hint); }

    /* Revision pills */
    .rev-pills { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
    .rev-pill { font-size: 10px; font-weight: 500; padding: 3px 9px; border-radius: 20px; }
    .pill-done { background: var(--green-light); color: #3B6D11; }
    .pill-due { background: var(--amber-light); color: #854F0B; }
    .pill-overdue { background: var(--red-light); color: #A32D2D; }
    .pill-pending { background: var(--gray-bg); color: var(--gray-hint); border: 1px solid var(--gray-border); }

    /* Card actions */
    .card-actions { display: flex; justify-content: space-between; align-items: center; }
    .btn-mark {
      font-size: 12px; font-weight: 500; padding: 6px 14px;
      border-radius: 20px; border: 1px solid var(--pink);
      background: transparent; color: var(--pink); cursor: pointer;
      font-family: 'DM Sans', sans-serif; transition: all 0.15s;
    }
    .btn-mark:active { background: var(--pink); color: white; }
    .btn-delete {
      font-size: 12px; padding: 6px 10px; border-radius: 20px;
      border: 1px solid var(--gray-border); background: transparent;
      color: var(--gray-hint); cursor: pointer; font-family: 'DM Sans', sans-serif;
    }
    .all-done-text { font-size: 12px; font-weight: 500; color: var(--green); }

    /* Empty state */
    .empty { text-align: center; padding: 48px 20px; color: var(--gray-text); }
    .empty .icon { font-size: 40px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    /* Floating notif permission button */
    .perm-bar {
      position: fixed; bottom: calc(var(--safe-bottom) + 16px); left: 50%;
      transform: translateX(-50%); background: var(--text); color: white;
      border-radius: 20px; padding: 12px 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; box-shadow: 0 4px 16px rgba(0,0,0,0.2); z-index: 200;
      display: none; align-items: center; gap: 8px; white-space: nowrap;
      font-family: 'DM Sans', sans-serif; border: none;
    }
    .perm-bar.show { display: flex; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="app-title">Med<span>Revise</span> 🌸</div>
      <div class="header-date" id="today-label"></div>
    </div>
    <div class="stats-bar">
      <div class="stat-pill">
        <div class="num" id="stat-total">0</div>
        <div class="lbl">Topics</div>
      </div>
      <div class="stat-pill warn">
        <div class="num" id="stat-due">0</div>
        <div class="lbl">Due Today</div>
      </div>
      <div class="stat-pill good">
        <div class="num" id="stat-done">0</div>
        <div class="lbl">Completed</div>
      </div>
    </div>
  </div>

  <div id="notif-banner" class="notif-banner">
    <span>💗</span><span id="notif-text"></span>
  </div>

  <div class="add-section">
    <div class="add-card">
      <div class="add-title">+ Add new topic studied today</div>
      <div class="form-row">
        <div class="form-group">
          <label>Subject</label>
          <select id="inp-subject">
            <option>Anatomy</option><option>Physiology</option><option>Biochemistry</option>
            <option>Pathology</option><option>Pharmacology</option><option>Microbiology</option>
            <option>Medicine</option><option>Surgery</option><option>Obs &amp; Gynae</option>
            <option>Pediatrics</option><option>PSM</option><option>ENT</option>
            <option>Ophthalmology</option><option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Topic name</label>
          <input id="inp-topic" placeholder="e.g. Brachial plexus" />
        </div>
      </div>
      <div class="form-group" style="margin-bottom:10px">
        <label>Key concepts / important points</label>
        <textarea id="inp-concepts" placeholder="e.g. Roots C5-T1 • Erb's palsy upper trunk • LOAF muscles median nerve..."></textarea>
      </div>
      <button class="btn-add" onclick="addTopic()">Add to revision schedule 🌸</button>
    </div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" onclick="setTab('all')" id="tab-all">All <span class="badge" id="cnt-all">0</span></div>
      <div class="tab" onclick="setTab('overdue')" id="tab-overdue">Overdue <span class="badge" id="cnt-overdue">0</span></div>
      <div class="tab" onclick="setTab('today')" id="tab-today">Today <span class="badge" id="cnt-today">0</span></div>
      <div class="tab" onclick="setTab('upcoming')" id="tab-upcoming">Upcoming <span class="badge" id="cnt-upcoming">0</span></div>
      <div class="tab" onclick="setTab('done')" id="tab-done">Done <span class="badge" id="cnt-done">0</span></div>
    </div>
  </div>

  <div class="list-section">
    <div class="list-label" id="list-label">All topics</div>
    <div id="topic-list"></div>
  </div>
</div>

<button class="perm-bar" id="perm-bar" onclick="requestNotifPermission()">
  🔔 Enable revision reminders
</button>

<script>
const REVISION_DAYS = [1,3,5,7,15];
const SUBJECT_COLORS = {
  'Anatomy':'#D4537E','Physiology':'#534AB7','Biochemistry':'#0F6E56',
  'Pathology':'#993C1D','Pharmacology':'#185FA5','Microbiology':'#3B6D11',
  'Medicine':'#BA7517','Surgery':'#A32D2D','Obs & Gynae':'#72243E',
  'Pediatrics':'#0C447C','PSM':'#3C3489','ENT':'#854F0B',
  'Ophthalmology':'#1D9E75','Other':'#5F5E5A'
};

let topics = JSON.parse(localStorage.getItem('medrevise_v2') || '[]');
let currentTab = 'all';

function today() { const d = new Date(); d.setHours(0,0,0,0); return d; }
function daysBetween(a, b) { return Math.floor((b - a) / 86400000); }

function getRevisions(t) {
  const studied = new Date(t.studiedDate); studied.setHours(0,0,0,0);
  return REVISION_DAYS.map((d, i) => {
    const due = new Date(studied); due.setDate(due.getDate() + d);
    const diff = daysBetween(today(), due);
    return { day: d, due, diff, done: !!(t.revisedOn && t.revisedOn[i]), index: i };
  });
}

function getStatus(t) {
  const revs = getRevisions(t);
  const pending = revs.filter(r => !r.done);
  if (!pending.length) return 'done';
  if (pending[0].diff < 0) return 'overdue';
  if (pending[0].diff === 0) return 'today';
  return 'upcoming';
}

function addTopic() {
  const topic = document.getElementById('inp-topic').value.trim();
  if (!topic) { document.getElementById('inp-topic').focus(); return; }
  const t = {
    id: Date.now(),
    subject: document.getElementById('inp-subject').value,
    topic,
    concepts: document.getElementById('inp-concepts').value.trim(),
    studiedDate: today().toISOString(),
    revisedOn: [false,false,false,false,false]
  };
  topics.unshift(t);
  save(); render();
  document.getElementById('inp-topic').value = '';
  document.getElementById('inp-concepts').value = '';
  showBanner(`"${topic}" added! Revision scheduled for Day 1, 3, 5, 7 & 15 🌸`);
}

function markRevised(id, idx) {
  const t = topics.find(x => x.id === id);
  if (!t) return;
  t.revisedOn[idx] = true;
  save(); render();
  const s = getStatus(t);
  showBanner(s === 'done' ? `"${t.topic}" — all revisions done! Great work 💪` : `Revision marked! Next one coming up 🌸`);
}

function deleteTopic(id) {
  if (!confirm('Delete this topic?')) return;
  topics = topics.filter(x => x.id !== id);
  save(); render();
}

function save() { localStorage.setItem('medrevise_v2', JSON.stringify(topics)); }

function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

function showBanner(msg) {
  const b = document.getElementById('notif-banner');
  document.getElementById('notif-text').textContent = msg;
  b.classList.add('show');
  setTimeout(() => b.classList.remove('show'), 4000);
}

function fmt(d) { return new Date(d).toLocaleDateString('en-IN', { day:'numeric', month:'short' }); }

function render() {
  const now = today();
  document.getElementById('today-label').textContent = now.toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short' });

  const withStatus = topics.map(t => ({ ...t, _s: getStatus(t) }));
  const counts = { all: topics.length, overdue:0, today:0, upcoming:0, done:0 };
  withStatus.forEach(t => counts[t._s]++);
  ['all','overdue','today','upcoming','done'].forEach(k => {
    document.getElementById('cnt-' + k).textContent = counts[k];
  });
  document.getElementById('stat-total').textContent = topics.length;
  document.getElementById('stat-due').textContent = counts.today + counts.overdue;
  document.getElementById('stat-done').textContent = counts.done;

  let filtered = withStatus;
  if (currentTab !== 'all') filtered = withStatus.filter(t => t._s === currentTab);
  const labels = { all:'All topics', overdue:'Overdue — revise ASAP 🔴', today:'Due today 🟡', upcoming:'Upcoming revisions 🟢', done:'Completed ✓' };
  document.getElementById('list-label').textContent = labels[currentTab];

  const list = document.getElementById('topic-list');
  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="icon">🌸</div><p>No topics here yet.<br>Add what you studied today!</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const revs = getRevisions(t);
    const color = SUBJECT_COLORS[t.subject] || '#D4537E';
    const cardClass = t._s === 'overdue' ? 'overdue' : t._s === 'today' ? 'due-today' : t._s === 'upcoming' ? 'upcoming' : '';
    const pills = revs.map(r => {
      let cls = r.done ? 'pill-done' : r.diff < 0 ? 'pill-overdue' : r.diff === 0 ? 'pill-due' : 'pill-pending';
      return `<span class="rev-pill ${cls}">Day ${r.day}${r.done ? ' ✓' : ''}</span>`;
    }).join('');
    const next = revs.find(r => !r.done);
    const badge = t._s === 'overdue' ? `<span class="status-badge overdue-badge">Overdue</span>` :
                  t._s === 'today' ? `<span class="status-badge today-badge">Due Today</span>` : '';
    const action = next
      ? `<button class="btn-mark" onclick="markRevised(${t.id},${next.index})">Mark Day ${next.day} done</button>`
      : `<span class="all-done-text">All revisions complete ✓</span>`;
    return `
      <div class="topic-card ${cardClass}">
        <div class="card-top">
          <span class="subject-badge" style="background:${color}18;color:${color}">${t.subject}</span>
          <div class="card-meta">${badge}<span class="studied-on">${fmt(t.studiedDate)}</span></div>
        </div>
        <div class="card-topic">${t.topic}</div>
        ${t.concepts ? `<div class="card-concepts">${t.concepts}</div>` : ''}
        <div class="rev-pills">${pills}</div>
        <div class="card-actions">
          ${action}
          <button class="btn-delete" onclick="deleteTopic(${t.id})">✕ Remove</button>
        </div>
      </div>`;
  }).join('');
}

// Notification permission
function requestNotifPermission() {
  Notification.requestPermission().then(p => {
    document.getElementById('perm-bar').classList.remove('show');
    if (p === 'granted') {
      showBanner('Notifications enabled! You will get daily revision reminders 🌸');
      scheduleDailyCheck();
    }
  });
}

function checkAndNotify() {
  if (Notification.permission !== 'granted') return;
  const overdue = topics.filter(t => getStatus(t) === 'overdue').length;
  const dueToday = topics.filter(t => getStatus(t) === 'today').length;
  const total = overdue + dueToday;
  if (total > 0) {
    const msg = overdue > 0
      ? `${overdue} overdue + ${dueToday} due today. Time to revise! 📖`
      : `${dueToday} topic(s) due for revision today. You've got this! 🌸`;
    navigator.serviceWorker.ready.then(reg => {
      reg.showNotification('MedRevise 🌸 Revision Reminder', {
        body: msg, icon: 'icon-192.png', badge: 'icon-192.png',
        tag: 'daily-reminder', renotify: true,
        actions: [{ action: 'open', title: 'Open App' }]
      });
    }).catch(() => {
      new Notification('MedRevise 🌸 Revision Reminder', { body: msg, icon: 'icon-192.png' });
    });
  }
}

function scheduleDailyCheck() {
  const now = new Date();
  const next = new Date(now);
  next.setHours(9, 0, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  const delay = next - now;
  setTimeout(() => { checkAndNotify(); setInterval(checkAndNotify, 86400000); }, delay);
}

// Init
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
if (Notification.permission === 'default') {
  document.getElementById('perm-bar').classList.add('show');
} else if (Notification.permission === 'granted') {
  scheduleDailyCheck();
}

// Sample data for first-time users
if (!topics.length) {
  topics = [
    { id: 1, subject:'Anatomy', topic:'Brachial Plexus', concepts:"Roots C5-T1 • Erb's palsy upper trunk • Klumpke's lower trunk • LOAF muscles by median nerve", studiedDate: new Date(Date.now()-86400000*2).toISOString(), revisedOn:[true,false,false,false,false] },
    { id: 2, subject:'Physiology', topic:'Cardiac Action Potential', concepts:'Phase 0: Na+ rush • Phase 2: Ca2+ plateau • SA node spontaneous depolarization • Absolute refractory period', studiedDate: new Date(Date.now()-86400000).toISOString(), revisedOn:[false,false,false,false,false] }
  ];
  save();
}

render();
</script>
</body>
</html>
