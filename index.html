<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>MedRevise 🌸</title>
  <meta name="theme-color" content="#D4537E"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="MedRevise"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="https://em-content.zobj.net/source/apple/354/cherry-blossom_1f338.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --pink:#D4537E; --pink-l:#FBEAF0; --pink-d:#993556; --pink-b:#F4C0D1;
      --rose:#72243E; --green:#1D9E75; --green-l:#EAF3DE;
      --amber:#EF9F27; --amber-l:#FAEEDA; --red:#E24B4A; --red-l:#FCEBEB;
      --bg:#FAFAF9; --card:#FFFFFF; --border:rgba(0,0,0,0.09);
      --text:#1A1A1A; --muted:#6B6B6B; --hint:#ADADAD;
      --sat: env(safe-area-inset-top,0px); --sab: env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh}
    .app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

    /* Header */
    .hdr{background:var(--card);border-bottom:1px solid var(--border);padding:calc(var(--sat) + 14px) 18px 14px;position:sticky;top:0;z-index:100}
    .hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:600}
    .logo span{color:var(--pink)}
    .hdate{font-size:12px;color:var(--muted)}
    .stats{display:flex;gap:8px}
    .stat{flex:1;background:var(--bg);border-radius:10px;padding:8px;text-align:center}
    .stat .n{font-size:18px;font-weight:500}
    .stat .l{font-size:10px;color:var(--muted);margin-top:1px}
    .stat.warn .n{color:var(--amber)}
    .stat.ok .n{color:var(--green)}

    /* Settings panel */
    .settings-btn{background:none;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif}
    .settings-panel{background:var(--card);border-bottom:1px solid var(--border);padding:14px 18px;display:none}
    .settings-panel.open{display:block}
    .settings-title{font-size:11px;font-weight:500;color:var(--pink);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
    .setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .setting-row:last-child{margin-bottom:0}
    .setting-lbl{font-size:13px;color:var(--text)}
    .setting-sub{font-size:11px;color:var(--muted);margin-top:2px}
    .time-input{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:7px 12px;font-size:14px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none}
    .time-input:focus{border-color:var(--pink)}
    .btn-save-time{background:var(--pink);color:white;border:none;border-radius:10px;padding:7px 16px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}
    .notif-status-row{display:flex;align-items:center;gap:8px;font-size:13px}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .dot.on{background:var(--green)}
    .dot.off{background:var(--amber)}
    .dot.denied{background:var(--red)}
    .btn-enable{background:var(--pink);color:white;border:none;border-radius:10px;padding:6px 14px;font-size:12px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer}

    /* Flash */
    .flash{margin:8px 16px 0;padding:10px 14px;background:var(--pink-l);border:1px solid var(--pink-b);border-radius:12px;font-size:13px;color:var(--rose);display:none;align-items:center;gap:8px}
    .flash.show{display:flex;animation:fi .3s ease}
    @keyframes fi{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

    /* Add form */
    .add-wrap{padding:14px 16px}
    .add-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:16px}
    .form-head{font-size:11px;font-weight:500;color:var(--pink);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:12px}
    .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .fg{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
    .fg label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:0.4px}
    .fg select,.fg input,.fg textarea{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:13px;color:var(--text);font-family:'DM Sans',sans-serif;outline:none;-webkit-appearance:none;transition:border-color .2s}
    .fg select:focus,.fg input:focus,.fg textarea:focus{border-color:var(--pink)}
    .fg textarea{min-height:68px;resize:none}
    .btn-add{width:100%;background:var(--pink);color:white;border:none;border-radius:12px;padding:12px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;transition:background .2s,transform .1s}
    .btn-add:active{transform:scale(0.98);background:var(--pink-d)}

    /* Tabs */
    .tabs-wrap{padding:0 16px 4px}
    .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{flex-shrink:0;font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px}
    .tab.active{background:var(--pink-l);border-color:var(--pink);color:var(--pink-d)}
    .badge{background:var(--hint);color:white;border-radius:10px;font-size:10px;padding:1px 6px;min-width:18px;text-align:center}
    .tab.active .badge{background:var(--pink)}

    /* List */
    .list-wrap{padding:10px 16px 100px;flex:1}
    .list-lbl{font-size:11px;font-weight:500;color:var(--hint);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}

    /* Card */
    .card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 16px;margin-bottom:10px}
    .card.overdue{border-left:3px solid var(--red)}
    .card.due-today{border-left:3px solid var(--amber)}
    .card.upcoming{border-left:3px solid var(--green)}
    .ctop{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
    .sbadge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px}
    .cmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .stbadge{font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px}
    .st-ov{background:var(--red-l);color:#A32D2D}
    .st-td{background:var(--amber-l);color:#854F0B}
    .ctopic{font-size:15px;font-weight:500;margin-bottom:4px}
    .cconcepts{font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:10px}
    .studied{font-size:11px;color:var(--hint)}
    .pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
    .pill{font-size:10px;font-weight:500;padding:3px 9px;border-radius:20px}
    .p-done{background:var(--green-l);color:#3B6D11}
    .p-ov{background:var(--red-l);color:#A32D2D}
    .p-td{background:var(--amber-l);color:#854F0B}
    .p-next{background:var(--bg);color:var(--hint);border:1px solid var(--border)}
    .cfoot{display:flex;justify-content:space-between;align-items:center}
    .btn-mark{font-size:12px;font-weight:500;padding:6px 14px;border-radius:20px;border:1px solid var(--pink);background:transparent;color:var(--pink);cursor:pointer;font-family:'DM Sans',sans-serif}
    .btn-mark:active{background:var(--pink);color:white}
    .btn-del{font-size:12px;padding:6px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--hint);cursor:pointer;font-family:'DM Sans',sans-serif}
    .done-txt{font-size:12px;font-weight:500;color:var(--green)}
    .empty{text-align:center;padding:48px 20px;color:var(--muted)}
    .empty .ico{font-size:36px;margin-bottom:10px}
    .empty p{font-size:14px;line-height:1.6}
  </style>
</head>
<body>
<div class="app">

  <div class="hdr">
    <div class="hrow">
      <div class="logo">Med<span>Revise</span> 🌸</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div class="hdate" id="hdate"></div>
        <button class="settings-btn" onclick="toggleSettings()">⚙ Settings</button>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><div class="n" id="s-total">0</div><div class="l">Topics</div></div>
      <div class="stat warn"><div class="n" id="s-due">0</div><div class="l">Due Today</div></div>
      <div class="stat ok"><div class="n" id="s-done">0</div><div class="l">Completed</div></div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settings-panel">
    <div class="settings-title">Settings</div>

    <div class="setting-row">
      <div>
        <div class="setting-lbl">Revision reminders</div>
        <div class="setting-sub" id="notif-sub">Loading...</div>
      </div>
      <div class="notif-status-row">
        <div class="dot off" id="notif-dot"></div>
        <button class="btn-enable" id="notif-btn" onclick="handleNotifBtn()">Enable</button>
      </div>
    </div>

    <div class="setting-row">
      <div>
        <div class="setting-lbl">Daily reminder time</div>
        <div class="setting-sub">Notification fires at this time every day</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="time" class="time-input" id="reminder-time" value="09:00"/>
        <button class="btn-save-time" onclick="saveReminderTime()">Save</button>
      </div>
    </div>
  </div>

  <div id="flash" class="flash"><span>💗</span><span id="flash-text"></span></div>

  <div class="add-wrap">
    <div class="add-card">
      <div class="form-head">+ Topic studied today</div>
      <div class="row2">
        <div class="fg" style="margin-bottom:0">
          <label>Subject</label>
          <select id="inp-subj">
            <option>Anatomy</option><option>Physiology</option><option>Biochemistry</option>
            <option>Pathology</option><option>Pharmacology</option><option>Microbiology</option>
            <option>Medicine</option><option>Surgery</option><option>Obs &amp; Gynae</option>
            <option>Pediatrics</option><option>PSM</option><option>ENT</option>
            <option>Ophthalmology</option><option>Other</option>
          </select>
        </div>
        <div class="fg" style="margin-bottom:0">
          <label>Topic name</label>
          <input id="inp-topic" placeholder="e.g. Brachial plexus"/>
        </div>
      </div>
      <div style="height:10px"></div>
      <div class="fg">
        <label>Key concepts / important points</label>
        <textarea id="inp-concepts" placeholder="e.g. Roots C5-T1 • Erb's palsy upper trunk • LOAF muscles..."></textarea>
      </div>
      <button class="btn-add" onclick="addTopic()">Add to revision schedule 🌸</button>
    </div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <div class="tab active" onclick="setTab('all')" id="tab-all">All <span class="badge" id="c-all">0</span></div>
      <div class="tab" onclick="setTab('overdue')" id="tab-overdue">Overdue <span class="badge" id="c-overdue">0</span></div>
      <div class="tab" onclick="setTab('today')" id="tab-today">Today <span class="badge" id="c-today">0</span></div>
      <div class="tab" onclick="setTab('upcoming')" id="tab-upcoming">Upcoming <span class="badge" id="c-upcoming">0</span></div>
      <div class="tab" onclick="setTab('done')" id="tab-done">Done <span class="badge" id="c-done">0</span></div>
    </div>
  </div>

  <div class="list-wrap">
    <div class="list-lbl" id="list-lbl">All topics</div>
    <div id="topic-list"></div>
  </div>
</div>

<script>
const REV_DAYS = [1,3,5,7,15];
const COLORS = {
  'Anatomy':'#D4537E','Physiology':'#534AB7','Biochemistry':'#0F6E56',
  'Pathology':'#993C1D','Pharmacology':'#185FA5','Microbiology':'#3B6D11',
  'Medicine':'#BA7517','Surgery':'#A32D2D','Obs & Gynae':'#72243E',
  'Pediatrics':'#0C447C','PSM':'#3C3489','ENT':'#854F0B',
  'Ophthalmology':'#1D9E75','Other':'#5F5E5A'
};

let topics = JSON.parse(localStorage.getItem('medrevise_v4') || '[]');
let tab = 'all';
let reminderTimer = null;

function tod(){ const d=new Date(); d.setHours(0,0,0,0); return d; }
function diffDays(a,b){ return Math.floor((b-a)/86400000); }

function revisions(t){
  const s=new Date(t.studiedDate); s.setHours(0,0,0,0);
  return REV_DAYS.map((d,i)=>{
    const due=new Date(s); due.setDate(due.getDate()+d);
    return {day:d,due,diff:diffDays(tod(),due),done:!!(t.revisedOn&&t.revisedOn[i]),i};
  });
}

function status(t){
  const p=revisions(t).filter(r=>!r.done);
  if(!p.length) return 'done';
  if(p[0].diff<0) return 'overdue';
  if(p[0].diff===0) return 'today';
  return 'upcoming';
}

function addTopic(){
  const topic=document.getElementById('inp-topic').value.trim();
  if(!topic){document.getElementById('inp-topic').focus();return;}
  topics.unshift({
    id:Date.now(),
    subject:document.getElementById('inp-subj').value,
    topic,
    concepts:document.getElementById('inp-concepts').value.trim(),
    studiedDate:tod().toISOString(),
    revisedOn:[false,false,false,false,false]
  });
  save(); render();
  document.getElementById('inp-topic').value='';
  document.getElementById('inp-concepts').value='';
  flash('"'+topic+'" added! Revisions set for Day 1, 3, 5, 7 & 15 🌸');
}

function markRevised(id,idx){
  const t=topics.find(x=>x.id===id); if(!t) return;
  t.revisedOn[idx]=true; save(); render();
  flash(status(t)==='done'?'All revisions done for "'+t.topic+'"! 💪':'Day '+REV_DAYS[idx]+' revision marked ✓ 🌸');
}

function deleteTopic(id){
  if(!confirm('Delete this topic?')) return;
  topics=topics.filter(x=>x.id!==id); save(); render();
}

function save(){ localStorage.setItem('medrevise_v4',JSON.stringify(topics)); }

function setTab(t){
  tab=t;
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  render();
}

function flash(msg){
  const el=document.getElementById('flash');
  document.getElementById('flash-text').textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),4000);
}

function fmt(d){ return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short'}); }

function render(){
  const now=tod();
  document.getElementById('hdate').textContent=now.toLocaleDateString('en-IN',{weekday:'short',day:'numeric',month:'short'});
  const ws=topics.map(t=>({...t,_s:status(t)}));
  const ct={all:topics.length,overdue:0,today:0,upcoming:0,done:0};
  ws.forEach(t=>ct[t._s]++);
  ['all','overdue','today','upcoming','done'].forEach(k=>{
    document.getElementById('c-'+k).textContent=ct[k];
  });
  document.getElementById('s-total').textContent=topics.length;
  document.getElementById('s-due').textContent=ct.today+ct.overdue;
  document.getElementById('s-done').textContent=ct.done;
  let filtered=tab==='all'?ws:ws.filter(t=>t._s===tab);
  const lbls={all:'All topics',overdue:'Overdue — revise now 🔴',today:'Due today 🟡',upcoming:'Upcoming 🟢',done:'Completed ✓'};
  document.getElementById('list-lbl').textContent=lbls[tab];
  const list=document.getElementById('topic-list');
  if(!filtered.length){
    list.innerHTML='<div class="empty"><div class="ico">🌸</div><p>No topics here.<br>Add what you studied today!</p></div>';
    return;
  }
  list.innerHTML=filtered.map(t=>{
    const revs=revisions(t);
    const c=COLORS[t.subject]||'#D4537E';
    const cls=t._s==='overdue'?'overdue':t._s==='today'?'due-today':t._s==='upcoming'?'upcoming':'';
    const pills=revs.map(r=>{
      const pc=r.done?'p-done':r.diff<0?'p-ov':r.diff===0?'p-td':'p-next';
      return '<span class="pill '+pc+'">Day '+r.day+(r.done?' ✓':'')+'</span>';
    }).join('');
    const next=revs.find(r=>!r.done);
    const badge=t._s==='overdue'?'<span class="stbadge st-ov">Overdue</span>':
                 t._s==='today'?'<span class="stbadge st-td">Due Today</span>':'';
    const action=next
      ?'<button class="btn-mark" onclick="markRevised('+t.id+','+next.i+')">Mark Day '+next.day+' done</button>'
      :'<span class="done-txt">All done ✓</span>';
    return '<div class="card '+cls+'">'
      +'<div class="ctop"><span class="sbadge" style="background:'+c+'18;color:'+c+'">'+t.subject+'</span>'
      +'<div class="cmeta">'+badge+'<span class="studied">'+fmt(t.studiedDate)+'</span></div></div>'
      +'<div class="ctopic">'+t.topic+'</div>'
      +(t.concepts?'<div class="cconcepts">'+t.concepts+'</div>':'')
      +'<div class="pills">'+pills+'</div>'
      +'<div class="cfoot">'+action+'<button class="btn-del" onclick="deleteTopic('+t.id+')">✕ Remove</button></div>'
      +'</div>';
  }).join('');
}

// ---- Settings ----
function toggleSettings(){
  const p=document.getElementById('settings-panel');
  p.classList.toggle('open');
}

function updateNotifUI(){
  const dot=document.getElementById('notif-dot');
  const btn=document.getElementById('notif-btn');
  const sub=document.getElementById('notif-sub');
  const perm=('Notification' in window)?Notification.permission:'unsupported';
  dot.className='dot';
  if(perm==='granted'){
    dot.classList.add('on');
    const t=localStorage.getItem('reminderTime')||'09:00';
    sub.textContent='ON — reminder set for '+formatTime(t)+' daily';
    btn.style.display='none';
  } else if(perm==='denied'){
    dot.classList.add('denied');
    sub.textContent='Blocked — go to iPhone Settings > Safari > Notifications';
    btn.style.display='none';
  } else if(perm==='unsupported'){
    dot.classList.add('off');
    sub.textContent='Add app to Home Screen first, then enable';
    btn.textContent='Enable'; btn.style.display='block';
  } else {
    dot.classList.add('off');
    sub.textContent='OFF — tap Enable to get daily reminders';
    btn.textContent='Enable'; btn.style.display='block';
  }
}

function formatTime(t){
  const [h,m]=t.split(':').map(Number);
  const ampm=h>=12?'PM':'AM';
  const h12=h%12||12;
  return h12+':'+(m<10?'0'+m:m)+' '+ampm;
}

function handleNotifBtn(){
  if(!('Notification' in window)){
    alert('Please open this app from your Home Screen icon (added via Safari Share → Add to Home Screen), then try again.');
    return;
  }
  Notification.requestPermission().then(p=>{
    updateNotifUI();
    if(p==='granted'){
      flash('Reminders enabled! You will be notified at '+formatTime(localStorage.getItem('reminderTime')||'09:00')+' daily 🌸');
      scheduleReminder();
    } else {
      flash('Blocked. Go to iPhone Settings > Safari > Notifications to allow.');
    }
  });
}

function saveReminderTime(){
  const t=document.getElementById('reminder-time').value;
  if(!t) return;
  localStorage.setItem('reminderTime',t);
  updateNotifUI();
  if(reminderTimer) clearTimeout(reminderTimer);
  if(Notification.permission==='granted'){
    scheduleReminder();
    flash('Reminder time saved: '+formatTime(t)+' 🌸');
  } else {
    flash('Time saved! Enable notifications to activate reminders.');
  }
}

function scheduleReminder(){
  if(reminderTimer) clearTimeout(reminderTimer);
  const saved=localStorage.getItem('reminderTime')||'09:00';
  document.getElementById('reminder-time').value=saved;
  const [h,m]=saved.split(':').map(Number);
  const now=new Date();
  const next=new Date(now);
  next.setHours(h,m,0,0);
  if(next<=now) next.setDate(next.getDate()+1);
  const delay=next-now;
  reminderTimer=setTimeout(()=>{
    fireReminder();
    reminderTimer=setInterval(fireReminder,86400000);
  },delay);
}

function fireReminder(){
  if(Notification.permission!=='granted') return;
  const overdue=topics.filter(t=>status(t)==='overdue').length;
  const due=topics.filter(t=>status(t)==='today').length;
  const total=overdue+due;
  if(total===0) return;
  const body=overdue>0
    ?overdue+' overdue + '+due+' due today. Open app to revise! 📖'
    :due+' topic(s) need revision today. You\'ve got this! 🌸';
  if('serviceWorker' in navigator&&navigator.serviceWorker.controller){
    navigator.serviceWorker.ready.then(reg=>{
      reg.showNotification('MedRevise 🌸',{body,tag:'daily',renotify:true});
    });
  } else {
    new Notification('MedRevise 🌸',{body});
  }
}

// ---- Service Worker ----
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js',{scope:'/medrevise/'})
    .then(()=>console.log('SW ok'))
    .catch(e=>console.log('SW err',e));
}

// ---- Init ----
if(!topics.length){
  topics=[
    {id:1,subject:'Anatomy',topic:'Brachial Plexus',concepts:"Roots C5-T1 • Erb's palsy upper trunk • Klumpke's lower trunk • LOAF muscles median nerve",studiedDate:new Date(Date.now()-86400000*2).toISOString(),revisedOn:[true,false,false,false,false]},
